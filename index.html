<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hộp Quà May Mắn - The Nights Endless Remix</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Hình nền đỏ vàng mang lại sự may mắn, thịnh vượng */
            background: linear-gradient(135deg, #d32f2f 0%, #ff9800 50%, #b71c1c 100%);
            background-size: cover;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* --- MÀN HÌNH CHÀO ĐỂ KÍCH HOẠT NHẠC --- */
        #welcomeScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(183, 28, 28, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #welcomeScreen h1 {
            color: #ffeb3b;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-align: center;
            padding: 0 20px;
        }

        .start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b71c1c;
            background-color: #ffeb3b;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* --- CSS GIAO DIỆN CHÍNH --- */
        .container {
            text-align: center;
            position: relative;
            cursor: pointer;
            width: 100%;
            padding: 20px;
            display: none; /* Ẩn đi, hiện sau khi bấm nút vào web */
        }

        /* --- CSS Tạo Hộp Quà --- */
        .gift-box {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto;
            transition: transform 0.5s ease;
        }

        .box-lid {
            position: absolute;
            top: 0;
            left: -5px;
            width: 160px;
            height: 40px;
            background-color: #ffeb3b;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 2;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
        }

        .box-lid::before {
            content: '';
            position: absolute;
            left: 65px;
            width: 30px;
            height: 40px;
            background-color: #e91e63;
        }

        .box-body {
            position: absolute;
            bottom: 0;
            width: 150px;
            height: 115px;
            background-color: #f44336;
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1;
            transition: transform 0.5s, opacity 0.5s;
        }

        .box-body::before {
            content: '';
            position: absolute;
            left: 60px;
            width: 30px;
            height: 115px;
            background-color: #e91e63;
        }

        .gift-box.shake {
            animation: shake 1.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            20% { transform: rotate(-8deg); }
            40% { transform: rotate(7deg); }
            60% { transform: rotate(-5deg); }
            80% { transform: rotate(3deg); }
        }

        .gift-box.open .box-lid {
            transform: translateY(-120px) rotate(-20deg) scale(0.8);
            opacity: 0;
        }

        .gift-box.open .box-body {
            transform: scale(0);
            opacity: 0;
        }

        /* --- CSS Lời Chúc --- */
        .message-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%;
            max-width: 600px;
            opacity: 0;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message-container.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .msg-line {
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800, 2px 2px 8px rgba(0,0,0,0.6);
            line-height: 1.4;
        }

        .line1 { font-size: 2.2rem; }
        .line2 { font-size: 1.8rem; color: #fffde7; }

        /* Nút Tắt/Bật nhạc */
        #musicToggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: rgba(255, 255, 255, 0.7);
            border: none;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2000;
            display: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        #musicToggle svg { width: 24px; height: 24px; fill: #333; }

        @media (max-width: 480px) {
            .line1 { font-size: 1.6rem; }
            .line2 { font-size: 1.3rem; }
            #welcomeScreen h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="welcomeScreen">
        <h1>Bạn nhận được một món quà may mắn! 🎁</h1>
        <button class="start-btn" id="startBtn">Mở Xem Ngay</button>
    </div>

    <div class="container" id="giftContainer">
        <div class="gift-box shake" id="giftBox">
            <div class="box-lid"></div>
            <div class="box-body"></div>
        </div>
        
        <div class="message-container" id="luckyTextContainer">
            <h1 class="msg-line line1">Chúc ae tối nay nhận được điểm cao nhé! 🍀💯</h1>
            <h2 class="msg-line line2">và chúc ae thành công trên con đường của mình ✨🚀</h2>
        </div>
    </div>

    <button id="musicToggle">
        <svg viewBox="0 0 24 24"><path id="musicIcon" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"></path></svg>
    </button>

    <script>
        const welcomeScreen = document.getElementById('welcomeScreen');
        const startBtn = document.getElementById('startBtn');
        const giftContainer = document.getElementById('giftContainer');
        const giftBox = document.getElementById('giftBox');
        const luckyTextContainer = document.getElementById('luckyTextContainer');
        const musicToggle = document.getElementById('musicToggle');
        const musicIcon = document.getElementById('musicIcon');

        // Khởi tạo nhạc The Nights
        const audio = new Audio('the-nights.mp3');
        audio.loop = true; 

        let confettiInterval;
        let isMusicPlaying = false;
        let isGiftOpened = false;

        // SỰ KIỆN KHI BẤM NÚT VÀO WEB
        startBtn.addEventListener('click', () => {
            // Ẩn màn hình chào mượt mà
            welcomeScreen.style.opacity = '0';
            setTimeout(() => {
                welcomeScreen.style.display = 'none';
                giftContainer.style.display = 'block'; // Hiện hộp quà chính
            }, 500);

            // PHÁT NHẠC NGAY LẬP TỨC tại đoạn điệp khúc (giây thứ 62)
            audio.currentTime = 62;
            audio.play().then(() => {
                isMusicPlaying = true;
                updateMusicIcon();
                musicToggle.style.display = 'block';
            }).catch(e => console.log("Lỗi âm thanh:", e));

            // Bắn một đợt pháo hoa nhẹ lúc mở đầu để tạo không khí
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        });

        // SỰ KIỆN KHI ẤN MỞ HỘP QUÀ CHÍNH
        giftContainer.addEventListener('click', () => {
            if (isGiftOpened) return;
            isGiftOpened = true;

            giftBox.classList.remove('shake');
            giftBox.classList.add('open');

            // Đảm bảo nhạc vẫn chạy đúng đoạn điệp khúc
            if(audio.currentTime < 60) {
                audio.currentTime = 62;
            }

            setTimeout(() => {
                luckyTextContainer.classList.add('show');
                startInfiniteConfetti(); // Kích hoạt pháo hoa nổ liên tục không ngừng
            }, 300);
        });

        // Giữ nhạc luôn lặp lại ở đoạn hay nhất (nếu chạy hết bài)
        audio.addEventListener('timeupdate', function() {
            if (audio.currentTime < 60 && isMusicPlaying) {
                audio.currentTime = 62;
            }
        });

        // Nút tắt/bật nhạc chủ động
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // Không làm ảnh hưởng đến sự kiện click hộp quà
            if (isMusicPlaying) {
                audio.pause();
                isMusicPlaying = false;
            } else {
                audio.play();
                isMusicPlaying = true;
            }
            updateMusicIcon();
        });

        function updateMusicIcon() {
            if (isMusicPlaying) {
                musicIcon.setAttribute('d', 'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z');
            } else {
                musicIcon.setAttribute('d', 'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z');
            }
        }

        // Hàm pháo hoa giấy dồn dập vô tận
        function startInfiniteConfetti() {
            const defaults = { startVelocity: 35, spread: 360, ticks: 50, zIndex: 1000 };
            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            confettiInterval = setInterval(function() {
                const particleCount = 60; 
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.3, 0.7), y: randomInRange(0.2, 0.4) } 
                }));
            }, 250);
        }
    </script>
</body>
</html>
